# Full test signal on every PR/push: the deterministic release gate (gate.yml)
# PLUS the integration suite and coverage.
#
# Integration + coverage are intentionally NOT part of the release gate — they
# drive Docker and are environment-sensitive (timing, image pulls), so they
# inform PRs but must never block a release. The release gate is gate.yml only.
# Integration tests run WITHOUT -race (docker/PTY + the race detector is flaky);
# they self-skip when their resource (docker/dbus/frps) is absent.
name: tests

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The same deterministic checks that gate a release (lint, unit+race, cross-build).
  gate:
    uses: ./.github/workflows/gate.yml

  integration:
    runs-on: ubuntu-latest # GitHub-hosted ubuntu has Docker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: extractions/setup-just@v4
      - run: just download-frpc
      - name: integration suite (no race; self-skips frps/dbus)
        run: cd src && go test -tags integration -count=1 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: extractions/setup-just@v4
      - run: just test-coverage-prod
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: src/coverage.out
          if-no-files-found: warn
