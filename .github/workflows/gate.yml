# Deterministic release gate: static checks, unit tests under the race detector
# (Linux + macOS), and a cross-compile of every release target. These do not
# touch Docker/dbus/frps, so they don't flake — which is why release.yml requires
# them before publishing. Reused by tests.yml (which adds integration + coverage).
name: gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: extractions/setup-just@v4
      - run: just lint

  unit:
    name: unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - uses: extractions/setup-just@v4
      - run: just download-frpc
      - name: unit tests (race + shuffle, no cache)
        run: cd src && go test -race -shuffle=on -count=1 ./...

  # Single source of truth for the cross-build matrix: the repo's `targets` file.
  setup-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.t.outputs.json }}
    steps:
      - uses: actions/checkout@v6
      - id: t
        run: echo "json=$(jq -R -s -c 'split("\n") | map(select(length > 0))' targets)" >> "$GITHUB_OUTPUT"

  cross-build:
    name: build ${{ matrix.target }}
    needs: setup-targets
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.setup-targets.outputs.targets) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - name: cross-compile ${{ matrix.target }}
        run: scripts/build.sh src build "${{ matrix.target }}"
