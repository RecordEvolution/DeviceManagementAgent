# One-off validation that GitHub Actions can authenticate to Google Cloud via
# Workload Identity Federation and reach the release targets. READ-ONLY — it
# publishes nothing and mutates nothing. Run it from the Actions tab once the
# WIF setup + GCP_* variables are in place; delete this file once it's green.
name: wif-check

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for WIF

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm the GCP_* variables are visible to this repo
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || { echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is empty — is the org variable visible to this (public) repo?"; exit 1; }
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}" || { echo "::error::GCP_SERVICE_ACCOUNT is empty"; exit 1; }

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3

      - name: Identity (should be the release service account)
        run: gcloud auth list

      - name: Read access to gs://re-agent (no writes)
        run: gsutil ls gs://re-agent | head

      - name: Artifact Registry reachability
        run: |
          gcloud auth configure-docker europe-docker.pkg.dev --quiet
          gcloud artifacts repositories list --project=record-1283 --location=europe --limit=5 \
            || echo "::warning::AR list failed — verify the SA has artifactregistry.writer"
